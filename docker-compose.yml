services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: georisk
      POSTGRES_PASSWORD: georisk_dev
      POSTGRES_DB: georisk
    ports:
      - "54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U georisk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9201:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: .env
    ports:
      - "8100:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/python-shared:/app/packages/python-shared
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./apps/workers:/app/apps/workers
      - ./apps/api:/app/apps/api
      - ./packages/python-shared:/app/packages/python-shared
    command: celery -A apps.workers.celery_app worker --loglevel=info --concurrency=4

  beat:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: .env
    depends_on:
      - worker
    volumes:
      - ./apps/workers:/app/apps/workers
      - ./apps/api:/app/apps/api
    command: celery -A apps.workers.celery_app beat --loglevel=info

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "5174:5174"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
    command: pnpm --filter web dev --host

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
  es_data:
